# SPDX-License-Identifier: GPL-2.0-or-later
name: Test
on: [push, pull_request]
jobs:
  kunit:
    name: KUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)
      - name: Build ksmbd module
        run: make -j$(nproc)
      - name: Build with warnings
        run: |
          make -j$(nproc) W=1 2>&1 | tee build-output.txt
          # Fail CI on compile errors (warnings are informational)
          if grep -q 'error:' build-output.txt; then
            echo "ERROR: Build produced compile errors"
            exit 1
          fi
          echo "Module build succeeded"
      - name: Syntax-check KUnit test sources
        run: |
          KERN_HEADERS="/usr/src/linux-headers-$(uname -r)"
          ERRORS=0
          for f in test/ksmbd_test_*.c; do
            echo "Checking: $f"
            if ! gcc -fsyntax-only -std=gnu11 \
              -include "$KERN_HEADERS/include/linux/kconfig.h" \
              -I "$KERN_HEADERS/include" \
              -I "$KERN_HEADERS/include/uapi" \
              -I "$KERN_HEADERS/arch/x86/include" \
              -I "$KERN_HEADERS/arch/x86/include/generated" \
              -I . -I mgmt/ \
              -D__KERNEL__ -DMODULE -DKBUILD_MODNAME='"ksmbd_test"' \
              "$f" 2>&1; then
              echo "WARNING: Syntax errors in $f (non-fatal, may need kernel-internal headers)"
            fi
          done
          echo "KUnit syntax check complete"
      - name: Verify test infrastructure and scripts
        run: |
          bash -n run_tests.sh
          bash -n test_compilation.sh
          bash -n benchmarks/run_benchmarks.sh
          for f in tests/*.sh; do
            [ -f "$f" ] && bash -n "$f"
          done
          echo "All scripts pass syntax check"
      - name: Run test compilation validation
        run: |
          bash test_compilation.sh
      - name: Run test framework dry-run
        run: |
          bash run_tests.sh --dry-run

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-generic cppcheck
      - name: Check for BUG_ON usage
        run: |
          if grep -rn 'BUG_ON' --include='*.c' --include='*.h' \
              --exclude-dir=test --exclude-dir=.git .; then
            echo "ERROR: BUG_ON usage found - use WARN_ON_ONCE instead"
            exit 1
          fi
      - name: Check for mixed tabs/spaces
        run: |
          ISSUES=0
          for f in $(find . -name '*.c' -o -name '*.h' | grep -v test/ | grep -v .git); do
            if grep -Pn '^\t+ ' "$f" 2>/dev/null; then
              echo "WARNING: Mixed tabs/spaces in $f"
              ISSUES=$((ISSUES + 1))
            fi
          done
          echo "Total files with mixed indentation: $ISSUES"
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance --suppress=missingInclude \
            --suppress=unusedFunction --quiet \
            --exclude=test/ --exclude=.git/ \
            -I . -I mgmt/ \
            *.c mgmt/*.c 2>&1 | tee cppcheck-output.txt
          if [ -s cppcheck-output.txt ]; then
            echo "cppcheck found issues (non-blocking)"
          fi
        continue-on-error: true
      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-output.txt
      - name: Check for TODO/FIXME/HACK
        run: |
          echo "=== Code debt markers ==="
          grep -rn 'TODO\|FIXME\|HACK\|XXX' --include='*.c' --include='*.h' \
            --exclude-dir=test --exclude-dir=.git . || echo "None found"

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint test scripts
        run: |
          shellcheck --severity=error tests/*.sh
      - name: Lint benchmark scripts
        run: |
          shellcheck --severity=error benchmarks/*.sh

  benchmark-regression:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Verify benchmark scripts exist
        run: |
          for script in benchmarks/run_benchmarks.sh benchmarks/compare_servers.sh \
                        benchmarks/scalability_test.sh benchmarks/latency_profile.sh; do
            if [ ! -f "$script" ]; then
              echo "ERROR: Missing benchmark script: $script"
              exit 1
            fi
            if [ ! -x "$script" ]; then
              echo "ERROR: Benchmark script not executable: $script"
              exit 1
            fi
          done
          echo "All benchmark scripts present and executable"
      - name: Verify benchmark --help works
        run: |
          for script in benchmarks/*.sh; do
            echo "=== $script --help ==="
            bash "$script" --help || true
          done
