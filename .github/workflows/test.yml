name: Test
on: [push, pull_request]
jobs:
  kunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Run KUnit tests
        run: |
          # KUnit tests are run as part of kernel build
          # This requires a kernel source tree with KUnit support
          echo "KUnit test execution requires kernel build environment"
          echo "See test/ directory for KUnit test sources"
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          # Check for common kernel coding style issues
          find . -name '*.c' -o -name '*.h' | head -20 | while read f; do
            if grep -Pn '\t ' "$f" 2>/dev/null; then
              echo "WARNING: Mixed tabs/spaces in $f"
            fi
          done
      - name: Check for common issues
        run: |
          # Check for BUG_ON usage (prohibited)
          if grep -rn 'BUG_ON' --include='*.c' --include='*.h' .; then
            echo "ERROR: BUG_ON usage found - use WARN_ON_ONCE instead"
            exit 1
          fi
