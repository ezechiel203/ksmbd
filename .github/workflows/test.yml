name: Test

on: [push, pull_request, workflow_dispatch]

jobs:
  source-quality:
    name: Source Quality (${{ matrix.distro_id }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.distro }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu:24.04
            distro_id: ubuntu2404
          - distro: debian:bookworm
            distro_id: debian-bookworm
          - distro: fedora:41
            distro_id: fedora41
    env:
      TARGET_ARCH: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: .github/scripts/ci-install-deps.sh

      - name: Verify KUnit and fuzz source structure
        run: |
          for f in test/ksmbd_test_*.c; do
            grep -q '#include <kunit/test.h>' "$f"
            grep -q 'kunit_test_suite' "$f"
            grep -q 'MODULE_LICENSE' "$f"
          done

          for f in test/fuzz/*_fuzz.c; do
            grep -q '#include <linux/module.h>' "$f"
            grep -q 'module_init' "$f"
            grep -q 'MODULE_LICENSE' "$f"
          done

      - name: Verify test registry in Makefile
        run: |
          for f in test/ksmbd_test_*.c; do
            base=$(basename "$f" .c)
            grep -q "$base" test/Makefile
          done

      - name: Validate scripts
        run: |
          bash -n run_tests.sh
          bash -n test_compilation.sh
          for f in tests/*.sh benchmarks/*.sh; do
            [ -f "$f" ] && bash -n "$f"
          done

      - name: Run shellcheck
        run: shellcheck --severity=error tests/*.sh benchmarks/*.sh

      - name: Check forbidden BUG_ON usage
        run: |
          if grep -rn 'BUG_ON' --include='*.c' --include='*.h' \
              --exclude-dir=test --exclude-dir=.git .; then
            echo "BUG_ON usage found; use WARN_ON_ONCE instead."
            exit 1
          fi

      - name: Check mixed tabs/spaces
        run: |
          issues=0
          while IFS= read -r -d '' f; do
            if grep -Pn '^\t+ ' "$f" >/dev/null 2>&1; then
              echo "Mixed tabs/spaces: $f"
              issues=$((issues + 1))
            fi
          done < <(find . -type f \( -name '*.c' -o -name '*.h' \) \
                    -not -path './.git/*' -not -path './test/*' -print0)
          echo "Mixed indentation file count: $issues"

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance --quiet \
            --suppress=missingIncludeSystem --suppress=unusedFunction \
            --exclude=test --exclude=.git src 2>&1 | tee cppcheck-output.txt
        continue-on-error: true

      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-${{ matrix.distro_id }}
          path: cppcheck-output.txt
