# ksmbd-torture default configuration
#
# This file is sourced by ksmbd-torture.sh. Override any variable here or
# via environment variables. CLI flags take precedence over this file.

# ---------------------------------------------------------------------------
# VM Target
# ---------------------------------------------------------------------------
VM_NAME="VM3"
VM_HOST="127.0.0.1"
VM_SSH_PORT="13022"
VM_USER="root"
VM_PASS="root"

# ---------------------------------------------------------------------------
# SMB Configuration
# ---------------------------------------------------------------------------
SMB_HOST="127.0.0.1"
SMB_PORT="13445"
SMB_SHARE="test"
SMB_USER="testuser"
SMB_PASS="testpass"
SMB_CREDS="${SMB_USER}%${SMB_PASS}"

# Share root on the VM filesystem
SHARE_ROOT="/srv/smb/test"

# ---------------------------------------------------------------------------
# Execution
# ---------------------------------------------------------------------------
DEFAULT_TIMEOUT=30
PARALLEL_JOBS=1
RETRY_COUNT=0
RESTART_BETWEEN="no"
SHUFFLE="no"

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
VERBOSE="no"
NO_COLOR="no"
TAP_OUTPUT="no"

# ---------------------------------------------------------------------------
# Health Monitoring
# ---------------------------------------------------------------------------
NO_HEALTH_CHECK="no"
NO_RESTART="no"

# Slab growth threshold (objects) before flagging as warning
SLAB_WARN_THRESHOLD=500

# Connection count threshold for "leftover connections" warning
CONN_WARN_THRESHOLD=10
