[global]
    netbios name = KSMBD-VM
    server string = ksmbd full feature test server
    workgroup = WORKGROUP

    ; Protocol range: SMB1 through SMB3.1.1 (SMB1/SMB2_02 deprecated but available)
    server min protocol = SMB1
    server max protocol = SMB3_11

    ; Guest mapping: map unknown users to guest
    map to guest = bad user

    ; Encryption: capability is always available for SMB3 sessions.
    ; "smb2 encryption = yes" would force ALL sessions to encrypt,
    ; breaking non-encryption tests.  Encryption tests use the
    ; client-side SMB2_SESSION_REQ_FLAG_ENCRYPT_DATA flag instead.
    smb2 leases = yes
    smb2 max credits = 8192
    durable handles = yes

    ; Multichannel support
    server multi channel support = yes

    ; Signing: auto (smbtorture tests set their own signing requirements)
    server signing = auto

    ; Fruit/macOS extensions
    fruit extensions = yes
    fruit model = MacSamba

    ; Limits
    max connections = 128
    deadtime = 300

;; ── Share 1: Authenticated read-write share ──
[test]
    path = /srv/smb/test
    comment = Authenticated Read-Write Share
    read only = no
    guest ok = no
    browseable = yes
    create mask = 0664
    directory mask = 0775
    store dos attributes = yes
    oplocks = yes
    hide dot files = yes
    streams = yes
    acl xattr = yes

;; ── Share 2: Public anonymous share ──
[public]
    path = /srv/smb/public
    comment = Public Anonymous Share
    read only = no
    guest ok = yes
    browseable = yes
    create mask = 0666
    directory mask = 0777

;; ── Share 3: Read-only share (authenticated) ──
[docs]
    path = /srv/smb/docs
    comment = Read-Only Documentation Share
    read only = yes
    guest ok = no
    browseable = yes
    store dos attributes = yes
    follow symlinks = yes

;; ── Share 4: Hidden share (not browseable) ──
[secret]
    path = /srv/smb/secret
    comment = Hidden Non-Browseable Share
    read only = no
    guest ok = no
    browseable = no
    create mask = 0600
    directory mask = 0700
    hide dot files = yes

;; ── Share 5: Time Machine / Fruit share ──
[timemachine]
    path = /srv/smb/timemachine
    comment = macOS Time Machine Backup
    read only = no
    guest ok = no
    browseable = yes
    fruit time machine = yes
    fruit finder info = yes
    fruit resource fork size = yes
    fruit max access = yes
    create mask = 0644
    directory mask = 0755

;; ── Share 6: Guest-only share ──
[dropbox]
    path = /srv/smb/dropbox
    comment = Guest-Only Drop Box
    read only = no
    guest ok = yes
    browseable = yes
    create mask = 0666
    directory mask = 0777
    inherit owner = yes

;; ── Share 7: Streams and ACL testing share ──
[streams]
    path = /srv/smb/streams
    comment = Alternate Data Streams Test
    read only = no
    guest ok = no
    browseable = yes
    streams = yes
    acl xattr = yes
    store dos attributes = yes
    create mask = 0664
    directory mask = 0775

;; ── Share 8: Cross-mount point share ──
[media]
    path = /srv/smb/media
    comment = Media Share With Cross-Mount
    read only = yes
    guest ok = yes
    browseable = yes
    follow symlinks = yes
    crossmnt = yes
