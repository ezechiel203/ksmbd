[global]
    netbios name = KSMBD-VM
    server string = ksmbd test server
    workgroup = WORKGROUP
    server min protocol = SMB2_10
    server max protocol = SMB3_11
    map to guest = bad user
    max ip connections = 256
    smb2 leases = yes
    durable handles = yes
[test]
    path = /srv/smb/test
    comment = Test Share
    read only = no
    guest ok = yes
    browseable = yes
    create mask = 0777
    directory mask = 0777
    acl xattr = yes
    oplocks = yes
    streams = yes
